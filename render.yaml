services:
  - type: web
    name: fraud_control_portal
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn run:app

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: FLASK_ENV
        value: production

      - key: PYTHON_VERSION
        value: 3.11